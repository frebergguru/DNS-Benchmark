<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Black background with amber border, echoing the dark theme. -->
  <rect width="256" height="256" rx="32" fill="#000000"/>
  <rect x="8" y="8" width="240" height="240" rx="28"
        fill="none" stroke="#FFBF00" stroke-width="4"/>

  <!-- DNS wordmark. -->
  <text x="128" y="118" font-family="monospace" font-size="56"
        font-weight="bold" fill="#FFE066" text-anchor="middle">DNS</text>

  <!-- Three bar segments in the chart palette (cached / uncached / .com). -->
  <rect x="48"  y="160" width="42" height="14" fill="#FFBF00"/>
  <rect x="48"  y="184" width="92" height="14" fill="#6BFF6B"/>
  <rect x="48"  y="208" width="62" height="14" fill="#FF7AFF"/>

  <!-- Right-side x-axis tick. -->
  <line x1="208" y1="156" x2="208" y2="226" stroke="#B07F00" stroke-width="2"/>
</svg>
